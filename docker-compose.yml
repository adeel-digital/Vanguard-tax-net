version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tax_postgres_db
    environment:
      POSTGRES_DB: tax_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  neo4j:
    image: neo4j:5.18.0-community
    container_name: tax_neo4j_db
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt connection
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - neo4j_data:/data
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tax_backend_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/tax_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - neo4j
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tax_frontend_app
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  neo4j_data:
  neo4j_import:
  neo4j_plugins:
